# PyPI publish — hardened against the 2024–2026 supply-chain patterns.
#
#  - Trusted Publishing (OIDC): no long-lived PyPI token to leak/phish.
#  - PEP 740 attestations: signed, verifiable build provenance.
#  - All actions pinned to full commit SHAs (not mutable @vN tags) — the
#    tj-actions/changed-files-class hijack repointed tags to malicious commits.
#  - `uv sync --locked`: build runs against the committed, hash-verified
#    uv.lock; fails if the lock and pyproject diverge (no build-time dep
#    injection / silent resolution).
#  - `pip-audit` gate: a freshly-disclosed CVE in the dep set blocks release.
#  - Least privilege: top-level no permissions; id-token only in publish.
#  - `environment: pypi`: a human reviewer approves every release even if
#    CI or the repo is compromised (defense-in-depth behind OIDC).
#  - Tag-only trigger: never runs on ordinary pushes.
#
# SHA pins resolved via `gh api repos/<a>/commits/<latest-tag>`; the trailing
# comment records the human-readable version for audit/bump.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    name: Build + audit (locked)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Sync locked environment (reproducible, hash-verified)
        run: uv sync --locked --no-dev

      - name: Audit dependencies for known vulnerabilities
        run: uvx pip-audit --progress-spinner off

      - name: Build sdist + wheel
        run: uv build

      - name: Validate artifacts (PyPI ingestion check)
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for trusted publishing — the only elevated grant
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  verify:
    name: Verify on PyPI
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Catches "PyPI accepted the upload but the version isn't actually
      # live" failure modes — silent rejection, CDN propagation lag, etc.
      # v0.30.0 and v0.30.1 both had silent publish failures that nobody
      # noticed because the GitHub release page looked fine.
      - name: Confirm version is queryable on PyPI
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Verifying flarecrawl==$version is live on PyPI..."
          for attempt in 1 2 3 4 5; do
            if curl -fsS "https://pypi.org/pypi/flarecrawl/${version}/json" >/dev/null; then
              echo "✓ flarecrawl==$version is live on PyPI"
              exit 0
            fi
            echo "  attempt $attempt: not yet visible, waiting 15s..."
            sleep 15
          done
          echo "✗ flarecrawl==$version not visible on PyPI after 75s"
          exit 1

  notify-failure:
    # Surfaces the failure as a GitHub issue tagged release-failure so it
    # can't sink quietly into Actions noise. Runs on any failure in the
    # build / publish / verify chain.
    name: Notify on release failure
    needs: [build, publish, verify]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Release **${tag}** failed in workflow run ${runUrl}.`,
              '',
              'Failed jobs:',
              `- Build + audit: ${{ needs.build.result }}`,
              `- Publish: ${{ needs.publish.result }}`,
              `- Verify on PyPI: ${{ needs.verify.result }}`,
              '',
              'See `docs/RELEASING.md` for the post-mortem catalogue of',
              'common publish failures.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${tag} failed`,
              body,
              labels: ['release-failure'],
            });
